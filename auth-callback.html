<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Logging in… — ElevateIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600&family=Fraunces:ital,wght@0,600;1,600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/shared.css"/>
<script src="/shared.js" defer></script>
<style>
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--bg); margin:0; }
  .callback-card {
    background:var(--surface);
    border:1px solid var(--border2);
    border-radius:28px;
    padding:52px 44px;
    text-align:center;
    max-width:420px;
    width:90%;
    box-shadow:0 20px 60px rgba(124,92,252,0.12);
  }
  .spin {
    width:48px; height:48px;
    border:3px solid var(--border2);
    border-top-color:var(--p);
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    margin:0 auto 24px;
  }
  @keyframes spin { to { transform:rotate(360deg) } }
  .cb-title { font-family:'Fraunces',serif; font-size:24px; font-weight:600; color:var(--t); margin-bottom:10px; }
  .cb-sub   { font-size:14px; color:var(--t2); line-height:1.7; }
</style>
</head>
<body>
<div class="callback-card">
  <div class="spin"></div>
  <div class="cb-title">Logging you in…</div>
  <div class="cb-sub">Verifying your Discord account.<br/>You'll be redirected in a moment.</div>
</div>
<div id="toast"></div>
</body>
</html>
