<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Logging in… — ElevateIQ</title>
<link rel="stylesheet" href="/shared.css"/>
<script src="/shared.js" defer></script>
<style>
  body{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);margin:0}
  .card{background:var(--surface);border:1px solid var(--border2);border-radius:28px;padding:52px 44px;text-align:center;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(124,92,252,0.12)}
  .spin{width:48px;height:48px;border:3px solid var(--border2);border-top-color:var(--p);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
  @keyframes spin{to{transform:rotate(360deg)}}
  h2{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--t);margin:0 0 8px}
  p{font-size:14px;color:var(--t2);margin:0;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="spin"></div>
  <h2>Logging you in…</h2>
  <p>Verifying your Discord account.<br/>Redirecting in a moment.</p>
</div>
<div id="toast"></div>
</body>
</html>
