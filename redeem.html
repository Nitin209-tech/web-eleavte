<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Redeem Code — Rewards Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Fraunces:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link rel="stylesheet" href="shared.css"/>
</head>
<body>
<div class="mc-theme-bg" id="mc-bg"></div>
<div class="bg-mesh" id="std-bg"></div>

<nav id="main-nav">
  <div class="nav-inner">
    <a class="brand" href="index.html">IQ Rewards<span>Portal</span></a>
    <div class="nav-tabs">
      <button class="ntab" onclick="location.href='index.html'">Home</button>
      <button class="ntab active" onclick="location.href='redeem.html'">Redeem</button>
    </div>
  </div>
</nav>

<div class="wrap-sm" id="std-ui">
  <div class="card" id="rd-s1">
    <h3>Select Game</h3>
    <button class="btn btn-primary" onclick="rdGame('mc')">Minecraft</button>
    <button class="btn btn-primary" onclick="rdGame('rb')">Roblox</button>
    <button class="btn btn-primary" onclick="rdGame('nitro')">Discord Nitro</button>
  </div>

  <div class="scard" id="rd-ok">
    <h3>Success!</h3>
    <p>Redeemed successfully.</p>
    <button class="btn btn-primary" onclick="rdBack()">Done</button>
  </div>
</div>

<div class="mc-pro-container" id="mc-ui" style="display:none">
  <div class="mc-login-box">
    <h2>Minecraft Sign In</h2>
    <input type="text" id="mc-user" placeholder="Email">
    <button onclick="rdDoMcLogin()">Next</button>
  </div>
</div>

<div class="rb-theme-wrapper" id="rb-ui" style="display:none">
  <div class="rb-topbar">Roblox</div>
  <div class="wrap">
    <input type="text" id="rb-code" placeholder="Roblox Code">
    <button onclick="rdSubmitRb()">Redeem</button>
  </div>
</div>

<div class="dc-theme-wrapper" id="dc-ui" style="display:none">
  <div class="dc-sidebar">Discord</div>
  <div class="dc-main">
    <input type="text" id="dc-code" placeholder="Nitro Code">
    <button onclick="rdSubmitDc()">Redeem</button>
  </div>
</div>

<div id="toast"></div>

<script>
function rdGame(g){
  document.getElementById('std-ui').style.display='none';
  if(g==='mc'){ document.getElementById('mc-ui').style.display='flex'; document.getElementById('mc-bg').classList.add('show'); }
  if(g==='rb'){ document.getElementById('rb-ui').style.display='flex'; }
  if(g==='nitro'){ document.getElementById('dc-ui').style.display='flex'; }
}
function rdDoMcLogin(){ document.getElementById('mc-ui').innerHTML = 'Redeem: <input id="mc-c"><button onclick="rdSubmitPro()">Go</button>'; }
function rdSubmitPro(){ location.reload(); }
function rdSubmitRb(){ location.reload(); }
function rdSubmitDc(){ location.reload(); }
function rdBack(){ location.reload(); }
</script>
</body>
</html>
